# Thresher Configuration
# Copy to config.yaml and customize for your environment.
# Values below show defaults -- uncomment and change as needed.
#
# Loading order: built-in defaults -> this file -> environment variables
# Environment variables: QDRANT_URL, QDRANT_API_KEY, GCS_BUCKET

# --- Source Provider ---
source:
  provider: gcs
  gcs:
    bucket: ""                           # GCS bucket name (required, or GCS_BUCKET env)
    source_prefix: ""                    # Prefix for source files
    expanded_prefix: "expanded/"         # Prefix for expanded archive files
    cache_prefix: "cache/"               # Prefix for extraction cache
    queue_prefix: "queue/"               # Prefix for queue batches

# --- Destination Provider ---
destination:
  provider: qdrant
  qdrant:
    url: "http://localhost:6333"         # Qdrant URL (env: QDRANT_URL)
    api_key: ""                          # Qdrant API key (env: QDRANT_API_KEY)
    timeout: 60                          # Connection timeout seconds
    batch_size: 100                      # Upsert batch size

# --- File Type Groups ---
# User-defined groups merge with built-in defaults (defaults.yaml).
# Same-name groups replace the built-in entirely.
# Unmentioned built-in groups are preserved.
# max_file_size: 0 means no limit; set per group to skip oversized files.
#
# file_type_groups:
#   custom-group:
#     extensions: [".custom"]
#     extractor: raw-text
#     chunker:
#       strategy: chonkie-recursive
#       chunk_size: 512
#     max_file_size: 10485760              # 10 MB

# --- Routing Rules ---
# Rules are evaluated in declaration order (first-match-wins).
# Within a rule, criteria types are ANDed; values within each are ORed.
routing:
  default_collection: "default"           # Collection for unmatched files
  rules: []

# --- URL Resolvers ---
# Chain of resolvers tried in order; first non-None result wins.
# Built-in types: httrack (HTML comment), pattern (regex->template), domain-first
# Default (when empty): httrack -> domain-first
#
# url_resolvers: []

# --- Queue Settings ---
# queue:
#   batch_size: 1000                     # Items per batch file
#   lease_timeout: 600                   # Seconds before stale claim reclaim

# --- Processing Settings ---
# processing:
#   docling_timeout: 600                 # Subprocess timeout for docling conversion
#   per_file_timeout: 600                # Overall per-file processing timeout
#   image_min_size: 51200                # 50 KB -- skip smaller images from OCR
#   max_pages: 500                       # Max pages for docling extraction
#   retry_max: 3                         # Max retry attempts per file
#   memory_threshold_mb: 4096            # Runner RSS limit (4 GB)
#   malloc_arena_max: 2                  # MALLOC_ARENA_MAX setting
#   archive_depth: 2                     # Max recursive archive expansion depth
#   summary_interval: 100                # Log summary every N files
#   archive_exclude_extensions:           # Zip-based artifacts to never expand
#     - ".jar"
#     - ".war"
#     - ".whl"
#     - ".egg"
#     - ".apk"
#     - ".ipa"

# --- Embedding Settings ---
# embedding:
#   model: "sentence-transformers/all-MiniLM-L6-v2"
#   vector_size: 384
