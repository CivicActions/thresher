# Docker Compose for functional tests.
# Start with: docker compose -f docker-compose.functional.yaml up -d
# Stop with:  docker compose -f docker-compose.functional.yaml down -v

services:
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: thresher-fake-gcs
    ports:
      - "4443:4443"
    command: ["-scheme", "http", "-port", "4443", "-backend", "memory"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 2s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: thresher-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/healthz"]
      interval: 2s
      timeout: 5s
      retries: 10
