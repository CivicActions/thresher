repos:
- hooks:
  - args:
    - --fix
    exclude: ^mcp-server/
    id: ruff
  - exclude: ^mcp-server/
    id: ruff-format
  repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.11.11
- hooks:
  - entry: uv run ty check --python-version 3.10 --error-on-warning --exclude mcp-server
    id: ty
    language: system
    name: ty type check
    pass_filenames: false
    types:
    - python
  repo: local
- hooks:
  - id: commitizen
  - id: commitizen-branch
    stages:
    - pre-push
  repo: https://github.com/commitizen-tools/commitizen
  rev: v4.13.9
