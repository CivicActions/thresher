name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # uv sync needed for the local ty hook (language: system)
      - run: uv sync
      - uses: j178/prek-action@v2
        with:
          extra-args: --all-files

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/unit/ -v

  mcp-server:
    name: mcp-server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Lint MCP server
        working-directory: mcp-server
        run: |
          uv sync
          uv run ruff check .
          uv run ruff format --check .
      - name: Type check MCP server
        working-directory: mcp-server
        run: uv run mypy src/
        continue-on-error: true
      - name: Test MCP server
        working-directory: mcp-server
        run: uv run pytest tests/ -v

  functional:
    name: functional
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync

      # Start GCS + Qdrant services
      - name: Start Docker Compose services
        run: |
          docker compose -f docker-compose.functional.yaml up -d
          # Poll from host until both services are ready (images lack curl/wget/bash)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4443/storage/v1/b > /dev/null 2>&1 && \
               curl -sf http://localhost:6333/healthz > /dev/null 2>&1; then
              echo "Services are ready"
              break
            fi
            echo "Waiting for services... ($i/30)"
            sleep 2
          done

      # Create kind cluster for K8s orchestrator tests
      - uses: helm/kind-action@v1
        with:
          cluster_name: thresher-test

      # Cache the HuggingFace embedding model for e2e tests
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-sentence-transformers-all-MiniLM-L6-v2

      - run: uv run pytest tests/functional/ -v -m functional

      - name: Tear down Docker Compose
        if: always()
        run: docker compose -f docker-compose.functional.yaml down -v

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [lint, test, functional]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
