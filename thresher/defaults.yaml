# Built-in file type group defaults for Thresher
# These are merged with user configuration -- user groups with the same name
# completely replace the built-in group.
# max_file_size: 0 means no limit; set per group to skip oversized files.

file_type_groups:
  audio-video:
    extensions:
      - ".wav"
      - ".mp3"
      - ".m4a"
      - ".aac"
      - ".ogg"
      - ".flac"
      - ".mp4"
      - ".avi"
      - ".mov"
    mime_types:
      - "audio/"
      - "video/"
    extractor: docling
    chunker:
      strategy: chonkie-recursive
      chunk_size: 512
    priority: 45
    max_file_size: 0  # no limit for media files

  office-documents:
    extensions: [".pdf", ".docx", ".xlsx", ".pptx", ".html", ".htm", ".rtf"]
    mime_types: ["application/pdf", "application/vnd.openxmlformats"]
    extractor: docling
    chunker:
      strategy: docling-hybrid
      chunk_size: 512
    priority: 50
    max_file_size: 52428800  # 50 MB

  general-source:
    extensions:
      - ".py"
      - ".js"
      - ".ts"
      - ".java"
      - ".c"
      - ".cpp"
      - ".h"
      - ".go"
      - ".rs"
      - ".rb"
      - ".php"
      - ".cs"
      - ".swift"
      - ".kt"
      - ".scala"
      - ".sh"
      - ".bash"
      - ".pl"
      - ".r"
      - ".sql"
      - ".lua"
      - ".zig"
      - ".v"
      - ".lisp"
      - ".clj"
      - ".ex"
      - ".erl"
      - ".hs"
    mime_types:
      - "text/x-python"
      - "text/x-script.python"
      - "text/x-java"
      - "text/x-c"
      - "text/x-c++"
      - "text/x-script"
      - "text/x-shellscript"
      - "text/x-perl"
      - "text/x-ruby"
      - "text/x-php"
    extractor: raw-text
    chunker:
      strategy: chonkie-code
      chunk_size: 512
      language: auto
    priority: 60
    max_file_size: 10485760  # 10 MB

  data-files:
    extensions: [".json", ".xml", ".csv", ".tsv", ".yaml", ".yml", ".toml", ".ini", ".cfg", ".conf", ".properties"]
    mime_types: ["application/json", "application/xml", "text/xml", "text/csv"]
    extractor: raw-text
    chunker:
      strategy: chonkie-recursive
      chunk_size: 512
    priority: 70
    max_file_size: 52428800  # 50 MB

  images:
    extensions: [".png", ".jpg", ".jpeg", ".gif", ".bmp", ".tiff", ".svg"]
    mime_types: ["image/"]
    extractor: docling
    chunker:
      strategy: docling-hybrid
      chunk_size: 512
    priority: 80
    max_file_size: 52428800  # 50 MB

  plain-text:
    extensions: [".txt", ".md", ".rst", ".log", ".readme"]
    mime_types: ["text/plain"]
    extractor: raw-text
    chunker:
      strategy: chonkie-recursive
      chunk_size: 512
      recipe: markdown
    priority: 90
    max_file_size: 52428800  # 50 MB

  binary:
    mime_types: ["application/octet-stream"]
    extractor: skip
    chunker:
      strategy: skip
    priority: 999
